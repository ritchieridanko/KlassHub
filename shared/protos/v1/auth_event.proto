syntax = "proto3";

package auth.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/ritchieridanko/klasshub/shared/contract/events/v1;events";

message AuthCreated {
  string event_id = 1;
  string role = 2;
  string email = 3;
  string verification_token = 4;
  google.protobuf.Timestamp created_at = 5;
}

message AuthSchoolUpdateFailed {
  string event_id = 1;
  int64 school_id = 2;
  google.protobuf.Timestamp created_at = 3;
}

message AuthVerificationRequested {
  string event_id = 1;
  string email = 2;
  string verification_token = 3;
  google.protobuf.Timestamp created_at = 4;
}
