syntax = "proto3";

package auth.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/ritchieridanko/klasshub/shared/contract/apis/v1;apis";

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
}

message Auth {
  google.protobuf.StringValue role = 1;
  google.protobuf.StringValue email = 2;
  google.protobuf.StringValue username = 3;
  google.protobuf.Timestamp last_login_at = 4;
  google.protobuf.Timestamp email_verified_at = 5;
  google.protobuf.Timestamp email_changed_at = 6;
  google.protobuf.Timestamp username_changed_at = 7;
  google.protobuf.Timestamp password_changed_at = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  google.protobuf.Timestamp deleted_at = 11;
}

message AuthToken {
  string access_token = 1;
  string refresh_token = 2;
  int64 access_token_expires_in = 3; // seconds
  int64 refresh_token_expires_in = 4; // seconds
}

message LoginRequest {
  string identifier = 1;
  string password = 2;
  string subdomain = 3;
}

message LoginResponse {
  AuthToken auth_token = 1;
  Auth auth = 2;
}
