syntax = "proto3";

package auth.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/ritchieridanko/klasshub/shared/contract/apis/v1;apis";

service AuthService {
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc Logout (LogoutRequest) returns (google.protobuf.Empty);
  rpc CreateSchoolAuth (CreateSchoolAuthRequest) returns (CreateSchoolAuthResponse);
  rpc UpdateSchool (UpdateSchoolRequest) returns (UpdateSchoolResponse);
  rpc ChangePassword (ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ResendVerification (google.protobuf.Empty) returns (ResendVerificationResponse);
  rpc VerifyEmail (VerifyEmailRequest) returns (VerifyEmailResponse);
  rpc RotateAuthToken (RotateAuthTokenRequest) returns (RotateAuthTokenResponse);
  rpc IsEmailAvailable (EmailAvailabilityCheckRequest) returns (EmailAvailabilityCheckResponse);
}

message Auth {
  optional string email = 1;
  optional string username = 2;
  string role = 3;
  bool is_verified = 4;
  bool school_exists = 5;
  google.protobuf.Timestamp password_changed_at = 6;
}

message AccessToken {
  string token = 1;
  int64 expires_in = 2; // seconds
}

message RefreshToken {
  string token = 1;
  int64 expires_in = 2; // seconds
}

message AuthToken {
  AccessToken access_token = 1;
  RefreshToken refresh_token = 2;
}

message LoginRequest {
  string identifier = 1;
  string password = 2;
}

message LoginResponse {
  Auth auth = 1;
  AuthToken auth_token = 2;
}

message LogoutRequest {
  string refresh_token = 1;
}

message CreateSchoolAuthRequest {
  string email = 1;
  string password = 2;
}

message CreateSchoolAuthResponse {
  Auth auth = 1;
  AuthToken auth_token = 2;
}

message UpdateSchoolRequest {
  int64 school_id = 1;
  string refresh_token = 2;
}

message UpdateSchoolResponse {
  Auth auth = 1;
  AuthToken auth_token = 2;
}

message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

message ChangePasswordResponse {
  Auth auth = 1;
}

message ResendVerificationResponse {
  string email = 1;
}

message VerifyEmailRequest {
  string verification_token = 1;
  string refresh_token = 2;
}

message VerifyEmailResponse {
  Auth auth = 1;
  AuthToken auth_token = 2;
}

message RotateAuthTokenRequest {
  string refresh_token = 1;
}

message RotateAuthTokenResponse {
  AuthToken auth_token = 1;
}

message EmailAvailabilityCheckRequest {
  string email = 1;
}

message EmailAvailabilityCheckResponse {
  bool is_available = 1;
}
