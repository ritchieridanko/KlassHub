syntax = "proto3";

package course.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/ritchieridanko/klasshub/shared/contract/apis/v1;apis";

service CourseService {
  rpc CreateCourse (CreateCourseRequest) returns (CreateCourseResponse);
}

message Course {
  string id = 1;
  optional string school_course_id = 2;
  string name = 3;
  optional string description = 4;
  optional string course_picture = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateCourseRequest {
  optional string school_course_id = 1;
  string name = 2;
  optional string description = 3;
  optional string course_picture = 4;
}

message CreateCourseResponse {
  Course course = 1;
}
