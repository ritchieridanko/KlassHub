syntax = "proto3";

package user.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/ritchieridanko/klasshub/shared/contract/apis/v1;apis";

service UserService {
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
}

message UserAdmin {
  string id = 1;
  optional string school_user_id = 2;
  string role = 3;
  string name = 4;
  optional string nickname = 5;
  string birthplace = 6;
  google.protobuf.Timestamp birthdate = 7;
  string sex = 8;
  optional string phone = 9;
  optional string profile_picture = 10;
  optional string profile_banner = 11;
  optional string created_by = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message CreateUserRequest {
  int64 auth_id = 1;
  int64 school_id = 2;
  optional string school_user_id = 3;
  string role = 4;
  string name = 5;
  string birthplace = 6;
  google.protobuf.Timestamp birthdate = 7;
  string sex = 8;
}

message CreateUserResponse {
  UserAdmin user = 1;
}
