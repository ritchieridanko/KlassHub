syntax = "proto3";

package user.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/ritchieridanko/klasshub/shared/contract/apis/v1;apis";

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

message User {
  string id = 1;
  google.protobuf.StringValue school_user_id = 2;
  string role = 3;
  string name = 4;
  google.protobuf.StringValue nickname = 5;
  google.protobuf.StringValue birthplace = 6;
  google.protobuf.Timestamp birthdate = 7;
  google.protobuf.StringValue sex = 8;
  google.protobuf.StringValue phone = 9;
  google.protobuf.StringValue profile_picture = 10;
  google.protobuf.StringValue profile_banner = 11;
  google.protobuf.StringValue created_by = 12;
  google.protobuf.StringValue created_by_name = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
  google.protobuf.Timestamp deleted_at = 16;
}

message GetUserRequest {
  int64 auth_id = 1;
  int64 school_id = 2;
}

message GetUserResponse {
  User user = 1;
}
