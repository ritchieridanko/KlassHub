syntax = "proto3";

package user.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/ritchieridanko/klasshub/shared/contract/apis/v1;apis";

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetUserAuthInfo(GetUserAuthInfoRequest) returns (GetUserAuthInfoResponse);
}

message User {
  string id = 1;
  optional string school_user_id = 2;
  string role = 3;
  string name = 4;
  optional string nickname = 5;
  string birthplace = 6;
  google.protobuf.Timestamp birthdate = 7;
  string sex = 8;
  optional string phone = 9;
  optional string profile_picture = 10;
  optional string profile_banner = 11;
}

message UserAuthInfo {
  int64 school_id = 1;
  string role = 2;
}

message GetUserRequest {
  int64 auth_id = 1;
  int64 school_id = 2;
}

message GetUserResponse {
  User user = 1;
}

message GetUserAuthInfoRequest {
  int64 auth_id = 1;
}

message GetUserAuthInfoResponse {
  UserAuthInfo auth_info = 1;
}
